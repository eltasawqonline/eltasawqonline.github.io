<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التسوق اولاين</title>
    <style>
        :root { --main: #000; --bg: #ffffff; --accent: #25D366; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; color: var(--main); overflow-x: hidden; }
        header { background: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #000; position: sticky; top: 0; z-index: 100; }
        
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; max-width: 600px; margin: 0 auto; }
        .card { background: #fff; cursor: pointer; border-radius: 12px; overflow: hidden; border: 3px solid transparent; position: relative; transition: transform 0.2s; }
        .card.selected { border-color: red; transform: scale(0.95); opacity: 0.8; }
        .card:active { transform: scale(0.95); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-info { padding: 8px; text-align: right; }
        .price { font-weight: 900; color: #d00; }

        .cart-header-btn { background: #f9f9f9; padding: 8px 16px; border-radius: 20px; cursor: pointer; display: flex; align-items: center; font-size: 1.2rem; position: relative; border: 1px solid #eee; transition: background 0.2s; }
        .cart-header-btn:active { transform: scale(0.95); }
        .cart-count { position: absolute; top: -6px; right: -6px; background: red; color: white; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .product-modal, .cart-modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #fff; z-index: 2000; overflow-y: auto; 
            display: none; opacity: 0; transform: translateY(30px);
            transition: 0.3s ease;
        }
        .show { display: block; opacity: 1; transform: translateY(0); }

        .close-modal { font-size: 2rem; cursor: pointer; position: absolute; left: 20px; top: 15px; z-index: 2100; background: #eee; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; }
        
        .slider-wrapper { position: relative; width: 100%; background: #f9f9f9; }
        .slider-container { width: 100%; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .slider-container img { width: 100%; flex-shrink: 0; scroll-snap-align: start; object-fit: contain; max-height: 450px; }
        
        .dots-container { display: flex; justify-content: center; gap: 6px; padding: 15px 0; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; }
        .dot.active { background: #000; width: 18px; border-radius: 10px; }

        .details-content { padding: 0 20px 50px 20px; text-align: right; }
        .size-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .size-btn { border: 1.5px solid #ddd; padding: 10px 18px; cursor: pointer; border-radius: 10px; font-weight: bold; }
        .size-btn.active { background: #000; color: #fff; border-color: #000; }
        .color-dot { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #ddd; display: inline-block; margin-left: 10px; cursor: pointer; }
        .color-dot.active { border-color: #000; transform: scale(1.1); }

        .shipping-form input, .shipping-form select, .shipping-form textarea { width: 100%; padding: 15px; margin-bottom: 12px; border: 1px solid #eee; border-radius: 12px; box-sizing: border-box; background: #fafafa; font-family: inherit; }
        .add-to-cart-btn { width: 100%; background: #000; color: #fff; border: none; padding: 20px; font-weight: bold; border-radius: 18px; cursor: pointer; font-size: 1.1rem; }
        .whatsapp-btn { width: 100%; background: var(--accent); color: #fff; border: none; padding: 20px; font-weight: bold; border-radius: 18px; cursor: pointer; font-size: 1.1rem; }

        .cart-item { display: flex; align-items: center; gap: 15px; padding: 15px; border-bottom: 1px solid #eee; position: relative; }
        .cart-item img { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; }
        .cart-item-info { flex: 1; text-align: right; }
        .remove-item { color: red; cursor: pointer; font-size: 14px; margin-top: 5px; display: block; }
        
        #adminPanel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; padding: 20px; border: 2px solid #000; z-index: 3000; width: 90%; max-width: 400px; border-radius: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.3); max-height: 80vh; overflow-y: auto; }
        #adminPanel input, #adminPanel textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-family: inherit; }

        .related-products { margin-top: 40px; border-top: 2px solid #eee; padding-top: 20px; }
        .related-products h3 { margin-bottom: 5px; }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 10px;">
        <h1 style="margin:0; font-size: 1.2rem;">التسوق اولاين</h1>
        <button id="multiDeleteBtn" style="display:none; background:red; color:#fff; border:none; padding:8px 12px; border-radius:8px; font-weight:bold; cursor:pointer;" onclick="toggleDeleteMode()">حذف 🗑️</button>
    </div>
    <div class="cart-header-btn" onclick="openCart()">
        🛒 <span class="cart-count" id="cartCount">0</span>
    </div>
</header>

<div class="container" id="productsGrid"></div>

<!-- مودال السلة -->
<div id="cartModal" class="cart-modal">
    <span class="close-modal" onclick="closeCart()">×</span>
    <div style="padding: 20px; text-align: right; margin-top: 50px;">
        <h2>سلة المشتريات 🛍️</h2>
        <div id="cartItems"></div>
        <div id="cartTotal" style="margin: 20px 0; font-weight: 900; font-size: 1.4rem;"></div>
        
        <div class="shipping-form" id="cartShippingForm" style="display:none;">
            <h3>بيانات التوصيل:</h3>
            <input type="text" id="custName" placeholder="الاسم بالكامل">
            <input type="tel" id="custPhone" placeholder="رقم الموبايل">
            <select id="custCity">
                <option value="">اختر المحافظة</option>
                <option>القاهرة</option><option>الجيزة</option><option>الإسكندرية</option><option>الدقهلية</option>
                <option>البحر الأحمر</option><option>البحيرة</option><option>الفيوم</option><option>الغربية</option>
                <option>الإسماعيلية</option><option>المنوفية</option><option>المنيا</option><option>القليوبية</option>
                <option>الوادي الجديد</option><option>السويس</option><option>الشرقية</option><option>أسوان</option>
                <option>أسيوط</option><option>بني سويف</option><option>بورسعيد</option><option>دمياط</option>
                <option>جنوب سيناء</option><option>كفر الشيخ</option><option>مطروح</option><option>الأقصر</option>
                <option>قنا</option><option>شمال سيناء</option><option>سوهاج</option>
            </select>
            <textarea id="custAddress" rows="2" placeholder="العنوان بالتفصيل"></textarea>
            <button class="whatsapp-btn" onclick="sendOrder()">تأكيد الطلب عبر واتساب</button>
        </div>
    </div>
</div>

<!-- لوحة التحكم -->
<div id="adminPanel">
    <h3 style="margin-top:0;">إضافة منتج جديد 🛠️</h3>
    <input type="text" id="pTitle" placeholder="اسم المنتج">
    <input type="number" id="pPrice" placeholder="السعر">
    <textarea id="pImgs" rows="2" placeholder="روابط الصور"></textarea>
    <textarea id="pDesc" rows="2" placeholder="الوصف"></textarea>
    <input type="text" id="pColors" placeholder="الألوان (افصل بفاصلة ,)">
    <input type="text" id="pSizes" placeholder="المقاسات (مثال: L,XL أو 32,34 افصل بفاصلة ,)">
    <button onclick="saveProduct()" style="width:100%; background:#000; color:#fff; padding:15px; border-radius:12px; font-weight:bold; border:none; cursor:pointer;">حفظ المنتج</button>
</div>

<!-- مودال المنتج -->
<div id="productModal" class="product-modal">
    <span class="close-modal" onclick="closeModal()">×</span>
    <div class="slider-wrapper">
        <div id="imageSlider" class="slider-container" onscroll="updateDots()"></div>
        <div id="dotsContainer" class="dots-container"></div>
    </div>
    <div class="details-content">
        <h2 id="modalTitle"></h2>
        <p id="modalPrice" style="font-size:1.6rem; font-weight:900; color:#d00;"></p>
        <div id="modalDesc" style="background:#f8f8f8; padding:15px; border-radius:12px; margin:15px 0; border-right:4px solid #000;"></div>
        
        <p style="font-weight:bold">اللون:</p><div id="modalColors"></div>
        <p style="font-weight:bold; margin-top:20px">المقاس:</p><div id="modalSizes" class="size-grid"></div>
        
        <p style="font-weight:bold; margin-top:20px">الكمية:</p>
        <input type="number" id="custQty" value="1" min="1" style="width: 80px; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
        
        <div style="margin-top:30px;">
            <button class="add-to-cart-btn" onclick="addToCart()">إضافة للسلة 🛒</button>
        </div>

        <div class="related-products">
            <h3>منتجات أخرى قد تعجبك:</h3>
            <div id="relatedGrid" class="container" style="padding:0; margin-top:15px;"></div>
        </div>
    </div>
</div>

<script>
    const dbURL = "https://mohanadstore-2cb02-default-rtdb.firebaseio.com/products";
    const myPhone = "201044667187";
    let cart = [];
    let allProducts = {};
    let selectedProduct = null, selCol = "", selSiz = "";
    let deleteMode = false, selectedIds = [];

    const savedCart = localStorage.getItem('onlineStoreCart');
    if(savedCart) { cart = JSON.parse(savedCart); }

    function addToCart() {
        const qty = parseInt(document.getElementById('custQty').value);
        if(!selCol || !selSiz || qty < 1) return alert("اختار اللون والمقاس والكمية!");
        cart.push({ id: Date.now(), title: selectedProduct.title, price: selectedProduct.price, color: selCol, size: selSiz, qty: qty, img: selectedProduct.imgs[0] });
        updateCartUI(); alert("تمت الإضافة للسلة!"); closeModal();
    }

    function updateCartUI() {
        localStorage.setItem('onlineStoreCart', JSON.stringify(cart));
        document.getElementById('cartCount').innerText = cart.length;
        const itemsDiv = document.getElementById('cartItems');
        itemsDiv.innerHTML = "";
        let total = 0;
        cart.forEach(item => {
            total += (item.price * item.qty);
            itemsDiv.innerHTML += `<div class="cart-item"><img src="${item.img}"><div class="cart-item-info"><strong>${item.title}</strong><br>اللون: ${item.color} | المقاس: ${item.size} | العدد: ${item.qty}<br><span style="color:#d00">${item.price * item.qty} EGP</span><span class="remove-item" onclick="removeItem(${item.id})">حذف 🗑️</span></div></div>`;
        });
        document.getElementById('cartTotal').innerText = cart.length > 0 ? `الإجمالي: ${total} EGP` : "السلة فارغة";
        document.getElementById('cartShippingForm').style.display = cart.length > 0 ? 'block' : 'none';
    }

    function removeItem(id) { cart = cart.filter(i => i.id !== id); updateCartUI(); }
    function hideCartUI() { document.getElementById('cartModal').classList.remove('show'); setTimeout(() => document.getElementById('cartModal').style.display = 'none', 300); }
    function hideProductUI() { document.getElementById('productModal').classList.remove('show'); setTimeout(() => document.getElementById('productModal').style.display = 'none', 300); }
    function openCart() { history.pushState({ modal: 'cart' }, ""); document.getElementById('cartModal').style.display = 'block'; setTimeout(() => document.getElementById('cartModal').classList.add('show'), 10); }
    function closeCart() { hideCartUI(); if(history.state && history.state.modal) history.back(); }

    function sendOrder() {
        const n = document.getElementById('custName').value, ph = document.getElementById('custPhone').value, city = document.getElementById('custCity').value, addr = document.getElementById('custAddress').value;
        if(!n || !ph || !city || !addr) return alert("اكمل بيانات الشحن!");
        let productsText = ""; let totalAll = 0;
        cart.forEach((item, index) => { productsText += `${index + 1}- ${item.title}\n   (اللون: ${item.color} | المقاس: ${item.size} | العدد: ${item.qty})\n`; totalAll += (item.price * item.qty); });
        const msg = `طلب جديد من المتجر 🔥\n\n📦 المنتجات:\n${productsText}\n💰 إجمالي الحساب: ${totalAll} EGP\n\n👤 العميل: ${n}\n📞 الموبايل: ${ph}\n📍 المحافظة: ${city}\n🏠 العنوان: ${addr}`;
        window.open(`https://wa.me/${myPhone}?text=${encodeURIComponent(msg)}`);
        cart = []; updateCartUI(); closeCart();
    }

    // تفعيل الكونسول السري
    window.show = function() {
        if(prompt("Password:") === "123") {
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('multiDeleteBtn').style.display = 'block';
        }
    };

    // وضع الحذف الجماعي المعدل (ينتظر الحذف الفعلي قبل تحديث الصفحة)
    async function toggleDeleteMode() {
        if (!deleteMode) {
            deleteMode = true;
            document.getElementById('multiDeleteBtn').style.background = "orange";
            document.getElementById('multiDeleteBtn').innerText = "تأكيد الحذف (0)";
            alert("⚠️ وضع الحذف مفعل! اضغط على المنتجات لتحديدها ثم اضغط تأكيد.");
        } else {
            if (selectedIds.length > 0) {
                if (confirm(`هل أنت متأكد من حذف ${selectedIds.length} منتج نهائياً؟`)) {
                    document.getElementById('multiDeleteBtn').innerText = "جاري الحذف ⏳...";
                    
                    // استخدام حلقة for للانتظار حتى يكتمل الحذف من السيرفر
                    for (let id of selectedIds) {
                        await fetch(`${dbURL}/${id}.json`, { method: 'DELETE' });
                    }
                    
                    location.reload(); // بعد الانتهاء، اعمل ريفريش
                }
            } else {
                deleteMode = false; selectedIds = [];
                document.getElementById('multiDeleteBtn').style.background = "red";
                document.getElementById('multiDeleteBtn').innerText = "حذف 🗑️";
                document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            }
        }
    }

    async function saveProduct() {
        const title = document.getElementById('pTitle').value, price = document.getElementById('pPrice').value, imgs = document.getElementById('pImgs').value;
        if(!title || !price || !imgs) return alert("اكمل البيانات");
        const data = { title, price, imgs: imgs.split('\n').filter(url => url.trim() !== ""), desc: document.getElementById('pDesc').value, colors: document.getElementById('pColors').value, sizes: document.getElementById('pSizes').value };
        await fetch(`${dbURL}.json`, { method: 'POST', body: JSON.stringify(data) });
        location.reload();
    }

    function openProduct(p) {
        if (!history.state || history.state.modal !== 'product') { history.pushState({ modal: 'product' }, ""); }
        selectedProduct = p; selCol = ""; selSiz = "";
        const modal = document.getElementById('productModal');
        
        const slider = document.getElementById('imageSlider'), dots = document.getElementById('dotsContainer');
        slider.innerHTML = ""; dots.innerHTML = "";
        (p.imgs || []).forEach((u, i) => { slider.innerHTML += `<img src="${u}">`; dots.innerHTML += `<div class="dot ${i===0?'active':''}"></div>`; });

        const cDiv = document.getElementById('modalColors'); cDiv.innerHTML = "";
        if(p.colors) p.colors.split(',').forEach(c => { cDiv.innerHTML += `<div class="color-dot" style="background:${c.trim()}" onclick="selectColor('${c.trim()}', this)"></div>`; });
        
        const sDiv = document.getElementById('modalSizes'); sDiv.innerHTML = "";
        if(p.sizes) p.sizes.split(',').forEach(s => { sDiv.innerHTML += `<div class="size-btn" onclick="selectSize('${s.trim()}', this)">${s.trim()}</div>`; });
        
        document.getElementById('modalTitle').innerText = p.title;
        document.getElementById('modalPrice').innerText = p.price + " EGP";
        document.getElementById('modalDesc').innerText = p.desc || "";
        document.getElementById('custQty').value = 1;

        const related = document.getElementById('relatedGrid'); related.innerHTML = "";
        for (let id in allProducts) {
            if (allProducts[id].title !== p.title) {
                let card = document.createElement('div'); card.className = 'card';
                card.onclick = () => { document.getElementById('productModal').scrollTop = 0; openProduct(allProducts[id]); };
                card.innerHTML = `<img src="${allProducts[id].imgs ? allProducts[id].imgs[0] : ''}"><div class="card-info"><h4 style="margin:5px 0; font-size:1rem;">${allProducts[id].title}</h4><div class="price">${allProducts[id].price} EGP</div></div>`;
                related.appendChild(card);
            }
        }
        modal.style.display = 'block'; setTimeout(() => modal.classList.add('show'), 10);
    }

    function closeModal() { hideProductUI(); if(history.state && history.state.modal) history.back(); }
    function selectColor(c, el) { document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active')); el.classList.add('active'); selCol = c; }
    function selectSize(s, el) { document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); selSiz = s; }
    
    function updateDots() {
        const slider = document.getElementById('imageSlider'), dots = document.querySelectorAll('.dot');
        const index = Math.round(slider.scrollLeft / slider.offsetWidth);
        dots.forEach((d, i) => d.classList.toggle('active', i === Math.abs(index)));
    }

    async function loadStore() {
        const res = await fetch(`${dbURL}.json`);
        allProducts = await res.json();
        const grid = document.getElementById('productsGrid'); grid.innerHTML = "";
        if(!allProducts) return;
        for (let id in allProducts) {
            const p = allProducts[id];
            const card = document.createElement('div');
            card.className = 'card';
            
            card.onclick = () => {
                if (deleteMode) {
                    if (selectedIds.includes(id)) {
                        selectedIds = selectedIds.filter(i => i !== id);
                        card.classList.remove('selected');
                    } else {
                        selectedIds.push(id);
                        card.classList.add('selected');
                    }
                    document.getElementById('multiDeleteBtn').innerText = `تأكيد الحذف (${selectedIds.length})`;
                } else {
                    openProduct(p);
                }
            };
            
            card.innerHTML = `<img src="${p.imgs ? p.imgs[0] : ''}"><div class="card-info"><h3>${p.title}</h3><div class="price">${p.price} EGP</div></div>`;
            grid.appendChild(card);
        }
    }
    
    window.addEventListener('popstate', function(event) { hideCartUI(); hideProductUI(); });

    updateCartUI(); loadStore();
</script>
</body>
</html>
