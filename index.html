<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETQO Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --main: #000; --bg: #ffffff; --accent: #25D366; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; color: var(--main); }
        
        /* Floating Header */
        .floating-header {
            position: sticky; top: 10px; z-index: 1000; background: rgba(255, 255, 255, 0.95);
            margin: 10px auto; width: 90%; max-width: 500px; padding: 12px 20px; border-radius: 30px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #eee;
        }
        .brand-name { font-weight: 800; font-size: 1.4rem; letter-spacing: 2px; }
        .header-icons { display: flex; gap: 15px; align-items: center; font-size: 1.2rem; cursor: pointer; }

        /* Product Grid */
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; max-width: 600px; margin: 0 auto; }
        .card { background: #fff; cursor: pointer; border-radius: 12px; overflow: hidden; border: 1px solid #eee; transition: transform 0.2s; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-info { padding: 8px; text-align: right; }
        .price { font-weight: 900; color: #d00; }

        /* Modals */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 2000; overflow-y: auto; display: none; }
        .close-modal { font-size: 2rem; cursor: pointer; position: absolute; left: 20px; top: 15px; z-index: 2100; }
        
        /* Product View */
        .main-product-img { width: 100%; height: 350px; object-fit: cover; border-radius: 15px; margin-bottom: 10px; }
        .thumb-container { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .thumbnail-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 2px solid transparent; cursor: pointer; }
        .thumbnail-img.active { border-color: #000; }
        
        /* Cart Styles (Match Screenshot) */
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; margin-bottom: 10px; }
        .cart-item-info { text-align: right; }
        .cart-item-img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; margin-right: 15px; }
        .btn-delete { color: #d00; cursor: pointer; font-size: 0.9rem; font-weight: bold; margin-top: 5px; display: inline-block; }

        /* Form Inputs */
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-main { width: 100%; background: #000; color: #fff; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
        .btn-whatsapp { background: var(--accent); }

        /* Options */
        .size-btn { border: 1.5px solid #ddd; padding: 10px 18px; cursor: pointer; border-radius: 10px; display: inline-block; margin: 5px; }
        .size-btn.active { background: #000; color: #fff; }
        .color-dot { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #ddd; display: inline-block; margin-left: 10px; cursor: pointer; }
        .color-dot.active { border: 2px solid #000; }

        /* Footer */
        .site-footer { padding: 40px 20px; background: #f9f9f9; text-align: center; border-top: 1px solid #eee; margin-top: 20px; }
        .social-link { width: 50px; height: 50px; border-radius: 50%; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; text-decoration: none; }
    </style>
</head>
<body>

<!-- Floating Header -->
<div class="floating-header">
    <i class="fas fa-bars"></i>
    <div class="brand-name">ETQO</div>
    <div class="header-icons">
        <i class="fas fa-search"></i>
        <div onclick="openCart()" style="position:relative;">🛒<span id="cartCount" style="position:absolute; top:-10px; right:-10px; background:red; color:white; font-size:10px; padding:2px 5px; border-radius:50%;">0</span></div>
    </div>
</div>

<div class="container" id="productsGrid"></div>

<footer class="site-footer">
    <div style="display:flex; justify-content:center; gap:20px; margin-bottom:20px;">
        <a href="https://wa.me/201205695744" class="social-link" target="_blank"><i class="fab fa-whatsapp"></i></a>
        <a href="https://www.tiktok.com/@eltasawqonline1" class="social-link" target="_blank"><i class="fab fa-tiktok"></i></a>
        <a href="https://www.facebook.com/share/1W8TTP7An9/" class="social-link" target="_blank"><i class="fab fa-facebook-f"></i></a>
    </div>
    <div style="font-size: 0.8rem; color: #888;">RIGHTS RESERVED TO ETQO 2026 ©</div>
</footer>

<!-- Cart Modal -->
<div id="cartModal" class="modal">
    <span class="close-modal" onclick="closeCart()">×</span>
    <div style="padding: 20px; padding-top: 60px;">
        <h2>سلة المشتريات 🛍️</h2>
        <div id="cartItems"></div>
        <h2 id="cartTotalText" style="text-align:center; margin:20px 0;"></h2>
        <div id="checkoutForm">
            <input type="text" id="custName" placeholder="الاسم بالكامل">
            <input type="tel" id="custPhone" placeholder="رقم الموبايل">
            <select id="custGov">
                <option value="">اختر المحافظة</option>
                <option value="القاهرة">القاهرة</option><option value="الجيزة">الجيزة</option>
                <option value="الإسكندرية">الإسكندرية</option>
            </select>
            <textarea id="custAddress" placeholder="العنوان بالتفصيل"></textarea>
            <button class="btn-main btn-whatsapp" onclick="sendOrder()">تأكيد الطلب عبر واتساب 💬</button>
        </div>
    </div>
</div>

<!-- Product Modal -->
<div id="productModal" class="modal">
    <span class="close-modal" onclick="closeModal()">×</span>
    <div style="padding: 20px; padding-top: 60px;">
        <img id="mainProductImage" src="" class="main-product-img">
        <div id="thumbs" class="thumb-container"></div>
        <h2 id="modalTitle"></h2>
        <p id="modalPrice" style="font-size:1.5rem; font-weight:bold; color:#d00;"></p>
        <p id="modalDesc" style="color:#555;"></p>
        <p>اللون:</p><div id="modalColors"></div>
        <p>المقاس:</p><div id="modalSizes"></div>
        <p>العدد:</p>
        <input type="number" id="modalQty" value="1" min="1">
        <button class="btn-main" onclick="addToCart()" style="margin-top:20px;">إضافة للسلة 🛒</button>
    </div>
</div>

<!-- Admin Panel -->
<div id="adminPanel" style="display:none; position:fixed; bottom:20px; left:20px; z-index:5000; background:#fff; padding:20px; border:2px solid #000; border-radius:15px; max-width: 300px;">
    <h3>لوحة التحكم 🛠️</h3>
    <input type="text" id="pTitle" placeholder="اسم المنتج">
    <input type="number" id="pPrice" placeholder="السعر">
    <textarea id="pImgs" placeholder="روابط الصور (كل رابط في سطر)"></textarea>
    <textarea id="pDesc" placeholder="الوصف"></textarea>
    <input type="text" id="pColors" placeholder="الألوان (comma separated)">
    <input type="text" id="pSizes" placeholder="المقاسات (comma separated)">
    <button class="btn-main" onclick="saveProduct()">حفظ المنتج</button>
</div>

<script>
    const dbURL = "https://mohanadstore-2cb02-default-rtdb.firebaseio.com/products";
    let cart = JSON.parse(localStorage.getItem('onlineStoreCart') || "[]");
    let allProducts = {}, selectedProduct = null, selCol = "", selSiz = "";
    let deleteMode = false;

    async function loadStore() {
        const res = await fetch(`${dbURL}.json`);
        allProducts = await res.json() || {};
        const grid = document.getElementById('productsGrid'); grid.innerHTML = "";
        for (let id in allProducts) {
            const p = allProducts[id];
            grid.innerHTML += `<div class="card" onclick="productClicked('${id}')">
                <img src="${p.imgs[0]}"><div class="card-info"><h3>${p.title}</h3><div class="price">${p.price} EGP</div></div>
            </div>`;
        }
        updateCartCount();
    }

    function productClicked(id) {
        if(deleteMode) { if(confirm("حذف هذا المنتج نهائياً؟")) { deleteProduct(id); } }
        else { openProduct(allProducts[id]); }
    }

    function openProduct(p) {
        selectedProduct = p; selCol = ""; selSiz = "";
        document.getElementById('modalTitle').innerText = p.title;
        document.getElementById('modalPrice').innerText = p.price + " EGP";
        document.getElementById('modalDesc').innerText = p.desc || "";
        document.getElementById('mainProductImage').src = p.imgs[0];
        
        const thumbs = document.getElementById('thumbs');
        thumbs.innerHTML = p.imgs.map((u, i) => `<img src="${u}" class="thumbnail-img ${i===0?'active':''}" onclick="changeMainImage('${u}', this)">`).join('');
        
        document.getElementById('modalColors').innerHTML = (p.colors || "").split(',').map(c => `<div class="color-dot" style="background:${c.trim()}" onclick="selCol='${c.trim()}'; document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('active')); this.classList.add('active');"></div>`).join('');
        document.getElementById('modalSizes').innerHTML = (p.sizes || "").split(',').map(s => `<div class="size-btn" onclick="selSiz='${s.trim()}'; document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('active')); this.classList.add('active');">${s.trim()}</div>`).join('');
        
        document.getElementById('productModal').style.display = 'block';
    }

    function changeMainImage(src, el) {
        document.getElementById('mainProductImage').src = src;
        document.querySelectorAll('.thumbnail-img').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }

    function addToCart() {
        if(!selCol || !selSiz) return alert("اختر اللون والمقاس!");
        cart.push({...selectedProduct, color: selCol, size: selSiz, qty: document.getElementById('modalQty').value});
        localStorage.setItem('onlineStoreCart', JSON.stringify(cart));
        updateCartCount(); closeModal(); alert("تمت الإضافة للسلة!");
    }

    function openCart() {
        document.getElementById('cartModal').style.display = 'block';
        let total = 0;
        document.getElementById('cartItems').innerHTML = cart.map((p, i) => {
            total += (p.price * p.qty);
            return `<div class="cart-item">
                <div class="cart-item-info">
                    <h3 style="margin:0">${p.title}</h3>
                    <p style="margin:5px 0; font-size:0.9rem">اللون: ${p.color} | المقاس: ${p.size} | العدد: ${p.qty}</p>
                    <span class="price">${p.price * p.qty} EGP</span>
                    <div class="btn-delete" onclick="removeFromCart(${i})">🗑️ حذف</div>
                </div>
                <img src="${p.imgs[0]}" class="cart-item-img">
            </div>`;
        }).join('');
        document.getElementById('cartTotalText').innerText = "الإجمالي: " + total + " EGP";
    }

    function removeFromCart(i) { cart.splice(i, 1); localStorage.setItem('onlineStoreCart', JSON.stringify(cart)); updateCartCount(); openCart(); }
    function updateCartCount() { document.getElementById('cartCount').innerText = cart.length; }
    
    // Admin & Utils
    window.show = () => { if(prompt("أدخل كلمة السر:") === "123") { document.getElementById('adminPanel').style.display = 'block'; deleteMode = true; alert("تم تفعيل وضع التعديل"); } };
    async function deleteProduct(id) { await fetch(`${dbURL}/${id}.json`, {method: 'DELETE'}); location.reload(); }
    async function saveProduct() {
        const data = { title: document.getElementById('pTitle').value, price: document.getElementById('pPrice').value, imgs: document.getElementById('pImgs').value.split('\n'), desc: document.getElementById('pDesc').value, colors: document.getElementById('pColors').value, sizes: document.getElementById('pSizes').value };
        await fetch(`${dbURL}.json`, { method: 'POST', body: JSON.stringify(data) });
        location.reload();
    }
    
    function sendOrder() {
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        const gov = document.getElementById('custGov').value;
        const addr = document.getElementById('custAddress').value;
        if(!name || !phone || !gov || !addr) return alert("يرجى ملء جميع البيانات");
        
        let msg = `طلب جديد:%0Aالاسم: ${name}%0Aالهاتف: ${phone}%0Aالمحافظة: ${gov}%0Aالعنوان: ${addr}%0A%0Aالمنتجات:%0A` + cart.map(p => `${p.title} (${p.color}, ${p.size}) - العدد: ${p.qty}`).join('%0A');
        window.open(`https://wa.me/201205695744?text=${msg}`, '_blank');
    }
    
    function closeModal() { document.getElementById('productModal').style.display = 'none'; }
    function closeCart() { document.getElementById('cartModal').style.display = 'none'; }
    
    loadStore();
</script>
</body>
</html>
