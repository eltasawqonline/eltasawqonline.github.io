<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOHANAD STORE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap');
        
        :root { 
            --bg-color: #fbfbfc;
            --surface-color: #ffffff;
            --text-main: #111111;
            --text-muted: #777777;
            --accent-color: #000000;
            --border-color: #eeeeee;
            --price-color: #222222;
            --whatsapp-color: #25D366;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg-color); color: var(--text-main); overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

        /* الهيدر على ستايل Hiilt البسيط */
        header { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            padding: 15px 24px; 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 100; 
            border-bottom: 1px solid var(--border-color);
        }
        
        .logo-title { font-size: 1.3rem; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; }

        .cart-header-btn { background: none; border: 1px solid var(--text-main); padding: 8px 16px; border-radius: 0px; font-family: inherit; font-weight: 600; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
        .cart-header-btn:active { background: var(--text-main); color: #fff; }
        .cart-count { background: var(--text-main); color: white; border-radius: 50%; min-width: 20px; height: 20px; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* عرض المنتجات بطريقة نظيفة وجذابة */
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; max-width: 800px; margin: 0 auto; }
        
        .card { background: var(--surface-color); cursor: pointer; position: relative; border-bottom: 1px solid transparent; padding-bottom: 10px; }
        .card img { width: 100%; height: 240px; object-fit: cover; background: #f5f5f7; display: block; }
        .card-info { padding: 10px 4px 4px 4px; text-align: right; }
        .card-info h3 { font-size: 0.9rem; font-weight: 400; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-main); }
        .price { font-weight: 700; color: var(--price-color); font-size: 0.95rem; }

        /* المودال الشفاف الانسيابي */
        .product-modal, .cart-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 2000; overflow-y: auto; display: none; }
        .close-modal { font-size: 1.5rem; cursor: pointer; position: absolute; left: 20px; top: 15px; z-index: 2100; background: rgba(255,255,255,0.9); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-color); }
        
        /* السلايدر الحديث للصور */
        .slider-wrapper { position: relative; width: 100%; background: #fff; }
        .slider-container { width: 100%; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .slider-container::-webkit-scrollbar { display: none; }
        .slider-container img { width: 100%; flex-shrink: 0; scroll-snap-align: start; object-fit: cover; height: 420px; }
        
        .dots-container { display: flex; justify-content: center; gap: 6px; padding: 12px 0; position: absolute; bottom: 10px; width: 100%; }
        .dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(0,0,0,0.2); }
        .dot.active { background: var(--text-main); width: 12px; border-radius: 4px; }

        /* تفاصيل المنتج */
        .details-content { padding: 20px; text-align: right; max-width: 600px; margin: 0 auto; }
        .section-title { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; color: var(--text-muted); margin-top: 20px; margin-bottom: 8px; }
        
        .size-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .size-btn { border: 1px solid var(--border-color); padding: 10px 20px; cursor: pointer; background: #fff; font-size: 0.85rem; font-weight: 600; }
        .size-btn.active { background: var(--text-main); color: #fff; border-color: var(--text-main); }
        
        .color-dot { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border-color); display: inline-block; margin-left: 10px; cursor: pointer; position: relative; }
        .color-dot.active::after { content: ''; position: absolute; top: -4px; left: -4px; right: -4px; bottom: -4px; border: 1px solid var(--text-main); border-radius: 50%; }

        .shipping-form input, .shipping-form select, .shipping-form textarea { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid var(--border-color); box-sizing: border-box; background: #fff; font-family: inherit; font-size: 0.9rem; }
        .shipping-form input:focus, .shipping-form select:focus, .shipping-form textarea:focus { border-color: var(--text-main); outline: none; }
        
        .add-to-cart-btn { width: 100%; background: var(--text-main); color: #fff; border: none; padding: 16px; font-weight: 700; cursor: pointer; font-size: 0.95rem; font-family: inherit; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .whatsapp-btn { width: 100%; background: var(--whatsapp-color); color: #fff; border: none; padding: 16px; font-weight: 700; cursor: pointer; font-size: 0.95rem; font-family: inherit; letter-spacing: 1px; }

        .cart-item { display: flex; align-items: center; gap: 15px; padding: 16px 0; border-bottom: 1px solid var(--border-color); }
        .cart-item img { width: 65px; height: 85px; object-fit: cover; }
        .cart-item-info { flex: 1; text-align: right; font-size: 0.85rem; }
        .remove-item { color: #ff3b30; cursor: pointer; font-size: 12px; margin-top: 6px; display: inline-block; }
        
        /* لوحة التحكم المخفية */
        #adminPanel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; padding: 24px; border: 1px solid var(--border-color); z-index: 3000; width: 90%; max-width: 400px; text-align: right; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        #adminPanel input, #adminPanel textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--border-color); box-sizing: border-box; font-family: inherit; }

        /* قسم التقييمات البسيط النظيف */
        .stars-display { color: #111; font-size: 0.9rem; margin: 6px 0; font-weight: 600; }
        .rating-section { border-top: 1px solid var(--border-color); padding-top: 20px; margin-top: 30px; }
        .review-box { padding: 12px 0; border-bottom: 1px solid var(--border-color); }
        .add-review-form { margin-top: 20px; display: flex; flex-direction: column; gap: 8px; }
        .star-rating-input { display: flex; gap: 5px; font-size: 1.3rem; cursor: pointer; color: #ccc; direction: ltr; justify-content: flex-end; }
        .star-rating-input span.active { color: #111; }
        .submit-review-btn { background: #fff; color: var(--text-main); border: 1px solid var(--text-main); padding: 12px; cursor: pointer; font-family: inherit; font-weight: 600; font-size: 0.85rem; }
        
        .more-products-title { font-weight: 700; font-size: 1.05rem; margin: 40px 0 15px 0; border-top: 1px solid var(--border-color); padding-top: 25px; text-transform: uppercase; }
    </style>
    <script>
        window.show = function() {
            var p = prompt("ادخل الرمز السري للوحة التحكم:");
            if(p === "2026") {
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('multiDeleteBtn').style.display = 'block';
                var boxes = document.querySelectorAll('.select-box');
                for(var i=0; i<boxes.length; i++) { boxes[i].style.display = 'block'; }
                return "تم تفعيل الوضع الإداري 🛠️";
            } else {
                alert("الرمز السري خطأ!");
                return "خطأ";
            }
        };
    </script>
</head>
<body>

<header id="mainHeader">
    <button class="cart-header-btn" onclick="openCart()">
        <span>BAG</span>
        <span class="cart-count" id="cartCount">0</span>
    </button>
    <button id="multiDeleteBtn" style="display:none; background:#ff3b30; color:#fff; border:none; padding:8px 16px; cursor:pointer; font-family:inherit; font-size:0.85rem;" onclick="deleteSelected()">حذف الكل 🗑️</button>
    <h1 class="logo-title" onclick="location.reload()">HIILT x MOHANAD</h1>
</header>

<div class="container" id="productsGrid"></div>

<!-- مودال العربة -->
<div id="cartModal" class="cart-modal">
    <span class="close-modal" onclick="closeCart()">×</span>
    <div style="padding: 24px; text-align: right; margin-top: 40px; max-width:600px; margin-left:auto; margin-right:auto;">
        <h2 style="font-weight:400; letter-spacing:1px; margin-bottom:20px;">حقيبة التسوق</h2>
        <div id="cartItems"></div>
        <div id="cartTotal" style="margin: 24px 0; font-weight: 700; font-size: 1.1rem;"></div>
        
        <div class="shipping-form" id="cartShippingForm" style="display:none;">
            <h3 class="section-title">تفاصيل الشحن والتوصيل</h3>
            <input type="text" id="custName" placeholder="الاسم بالكامل">
            <input type="tel" id="custPhone" placeholder="رقم الهاتف">
            <select id="custCity">
                <option value="">اختر المحافظة</option>
                <option>القاهرة</option><option>الجيزة</option><option>الإسكندرية</option><option>الدقهلية</option>
                <option>الغربية</option><option>المنوفية</option><option>القليوبية</option><option>الشرقية</option>
                <option>البحيرة</option><option>دمياط</option><option>بورسعيد</option><option>السويس</option>
                <option>الإسماعلية</option><option>كفر الشيخ</option><option>الفيوم</option><option>بني سويف</option>
                <option>المنيا</option><option>أسيوط</option><option>سوهاج</option><option>قنا</option>
                <option>الأقصر</option><option>أسوان</option><option>مطروح</option><option>الوادي الجديد</option>
                <option>البحر الأحمر</option><option>شمال سيناء</option><option>جنوب سيناء</option>
            </select>
            <textarea id="custAddress" rows="2" placeholder="العنوان بالتفصيل المُمِل"></textarea>
            <button class="whatsapp-btn" onclick="sendOrder()">إرسال الطلب عبر الواتساب</button>
        </div>
    </div>
</div>

<!-- لوحة التحكم الإدارية السريعة -->
<div id="adminPanel">
    <h3 style="margin-bottom:15px; font-weight:700;">إضافة منتج للبراند</h3>
    <input type="text" id="pTitle" placeholder="اسم القطعة">
    <input type="number" id="pPrice" placeholder="السعر بـ EGP">
    <textarea id="pImgs" rows="3" placeholder="روابط الصور (رابط واحد في كل سطر)"></textarea>
    <textarea id="pDesc" rows="3" placeholder="وصف وتفاصيل القطعة"></textarea>
    <input type="text" id="pColors" placeholder="الألوان المتاحة (مثال: #000000, #ffffff, #d2b48c)">
    <input type="text" id="pSizes" placeholder="المقاسات المتاحة (مثال: S, M, L, XL)">
    <button onclick="saveProduct()" style="width:100%; background:var(--text-main); color:#fff; padding:14px; border:none; cursor:pointer; font-weight:bold; font-family:inherit;">حفظ ونشر المنتج</button>
    <button onclick="document.getElementById('adminPanel').style.display='none'" style="width:100%; background:none; border:none; color:#ff3b30; margin-top:10px; cursor:pointer; font-family:inherit;">إغلاق لوحة التحكم</button>
</div>

<!-- مودال تفاصيل المنتج الفردي -->
<div id="productModal" class="product-modal">
    <span class="close-modal" onclick="closeModal()">×</span>
    <div class="slider-wrapper">
        <div id="imageSlider" class="slider-container" onscroll="updateDots()"></div>
        <div id="dotsContainer" class="dots-container"></div>
    </div>
    <div class="details-content">
        <h2 id="modalTitle" style="font-weight:400; font-size:1.3rem; margin-bottom: 4px; letter-spacing:0.5px;"></h2>
        <div id="modalAvgStars" class="stars-display"></div>
        <p id="modalPrice" style="font-size:1.2rem; font-weight:700; margin-top:5px; margin-bottom:20px;"></p>
        
        <div id="modalDesc" style="font-size:0.9rem; color:#444; line-height:1.7; margin-bottom:25px; white-space: pre-line;"></div>
        
        <div class="section-title">الألوان المتاحة</div>
        <div id="modalColors" style="margin-bottom:20px;"></div>
        
        <div class="section-title">المقاس المطلوب</div>
        <div id="modalSizes" class="size-grid" style="margin-bottom:25px;"></div>
        
        <div class="section-title">الكمية</div>
        <input type="number" id="custQty" value="1" min="1" style="width: 70px; padding: 10px; border: 1px solid var(--border-color); text-align:center; font-weight:600; font-family:inherit; margin-bottom:20px;">
        
        <button class="add-to-cart-btn" onclick="addToCart()">إضافة للحقيبة</button>

        <!-- قسم التقييمات والمراجعات -->
        <div class="rating-section">
            <h3 style="font-weight:600; font-size:1rem; text-transform:uppercase; margin-bottom:15px;">آراء وتجارب العملاء</h3>
            <div id="reviewsContainer" style="font-size:0.85rem; color:var(--text-muted);">لا توجد مراجعات بعد على هذه القطعة.</div>
            
            <div class="add-review-form">
                <div class="star-rating-input" id="starInput">
                    <span onclick="setStarInput(1)">★</span><span onclick="setStarInput(2)">★</span><span onclick="setStarInput(3)">★</span><span onclick="setStarInput(4)">★</span><span onclick="setStarInput(5)">★</span>
                </div>
                <input type="text" id="revName" placeholder="الاسم">
                <textarea id="revComment" rows="2" placeholder="اكتب رأيك الصادق في المنتج..."></textarea>
                <button class="submit-review-btn" onclick="submitReview()">إرسال المراجعة</button>
            </div>
        </div>

        <div class="more-products-title">قطع أخرى قد تعجبك</div>
        <div class="container" id="relatedProductsGrid" style="padding:0; gap:10px;"></div>
    </div>
</div>

<script>
    var dbURL = "https://mohanadstore-2cb02-default-rtdb.firebaseio.com";
    var myPhone = "201044667187";
    var cart = [];
    var allProducts = {};
    var selectedProductId = null, selectedProduct = null, selCol = "", selSiz = "";
    var currentInputStars = 5;
    var isModalOpen = false;

    window.addEventListener('popstate', function(event) {
        if (isModalOpen) { closeModal(true); }
    });

    function addToCart() {
        var qty = parseInt(document.getElementById('custQty').value);
        if(!selCol || !selSiz || qty < 1) return alert("من فضلك اختر اللون والمقاس أولاً!");
        var firstImg = (selectedProduct.imgs && selectedProduct.imgs.length > 0) ? selectedProduct.imgs[0] : "";
        cart.push({ id: Date.now(), title: selectedProduct.title, price: selectedProduct.price, color: selCol, size: selSiz, qty: qty, img: firstImg });
        updateCartUI(); alert("تمت إضافة القطعة بنجاح"); closeModal();
    }

    function updateCartUI() {
        document.getElementById('cartCount').innerText = cart.length;
        var itemsDiv = document.getElementById('cartItems');
        itemsDiv.innerHTML = ""; var total = 0;
        cart.forEach(function(item) {
            total += (item.price * item.qty);
            itemsDiv.innerHTML += '<div class="cart-item"><img src="'+item.img+'"><div class="cart-item-info"><strong>'+item.title+'</strong><br><span style="color:var(--text-muted); display:inline-block; margin-top:4px;">المقاس: '+item.size+' | اللون: '+item.color+' | العدد: '+item.qty+'</span><br><span style="font-weight:700; display:inline-block; margin-top:4px;">'+(item.price * item.qty)+' EGP</span><br><span class="remove-item" onclick="removeItem('+item.id+')">إزالة</span></div></div>';
        });
        document.getElementById('cartTotal').innerText = cart.length > 0 ? "الإجمالي المستحق: " + total + " EGP" : "الحقيبة فارغة حالياً.";
        document.getElementById('cartShippingForm').style.display = cart.length > 0 ? 'block' : 'none';
    }

    function removeItem(id) { cart = cart.filter(function(i) { return i.id !== id; }); updateCartUI(); }
    function openCart() { document.getElementById('cartModal').style.display = 'block'; }
    function closeCart() { document.getElementById('cartModal').style.display = 'none'; }

    function sendOrder() {
        var n = document.getElementById('custName').value.trim(), ph = document.getElementById('custPhone').value.trim(), city = document.getElementById('custCity').value, addr = document.getElementById('custAddress').value.trim();
        if(!n || !ph || !city || !addr) return alert("من فضلك املأ كافة الحقول لإتمام الشحن!");
        var text = "", total = 0;
        cart.forEach(function(item, i) { text += (i+1)+'. ' + item.title + ' [مقاس: ' + item.size + ' | لون: ' + item.color + ' | عدد: ' + item.qty + ']\n'; total += (item.price * item.qty); });
        var msg = "طلب شراء جديد 🛍️\n\nتفاصيل القطع:\n" + text + "\nإجمالي الحساب: " + total + " EGP\n\nبيانات المستلم:\nالاسم: " + n + "\nرقم الموبايل: " + ph + "\nالمحافظة: " + city + "\nالعنوان بالكامل: " + addr;
        window.open("https://wa.me/" + myPhone + "?text=" + encodeURIComponent(msg));
        cart = []; updateCartUI(); closeCart();
    }

    function saveProduct() {
        var title = document.getElementById('pTitle').value.trim(), price = document.getElementById('pPrice').value.trim(), imgs = document.getElementById('pImgs').value.trim();
        if(!title || !price || !imgs) return alert("الاسم، السعر، والصور حقول إجبارية!");
        var imgArray = imgs.split('\n').filter(function(u) { return u.trim() !== ""; });
        var data = { title: title, price: price, imgs: imgArray, desc: document.getElementById('pDesc').value.trim(), colors: document.getElementById('pColors').value.trim(), sizes: document.getElementById('pSizes').value.trim() };
        fetch(dbURL + "/products.json", { method: 'POST', body: JSON.stringify(data) }).then(function() { location.reload(); });
    }

    function deleteSelected() {
        var selected = document.querySelectorAll('.select-box:checked');
        if(confirm("هل أنت متأكد من حذف القطع المحددة نهائياً؟")) {
            var promises = [];
            selected.forEach(function(box) { promises.push(fetch(dbURL + "/products/" + box.value + ".json", { method: 'DELETE' })); });
            Promise.all(promises).then(function() { location.reload(); });
        }
    }

    function openProduct(id, p) {
        selectedProductId = id; selectedProduct = p; selCol = ""; selSiz = "";
        if (!isModalOpen) { window.history.pushState({ modalOpen: true }, ""); isModalOpen = true; }
        var modal = document.getElementById('productModal'), slider = document.getElementById('imageSlider'), dots = document.getElementById('dotsContainer');
        slider.innerHTML = ""; dots.innerHTML = "";
        var imgsList = p.imgs || [];
        imgsList.forEach(function(u, i) { slider.innerHTML += '<img src="'+u+'">'; dots.innerHTML += '<div class="dot '+(i===0?'active':'')+'"></div>'; });
        document.getElementById('modalTitle').innerText = p.title;
        document.getElementById('modalPrice').innerText = p.price + " EGP";
        document.getElementById('modalDesc').innerText = p.desc || "لا تتوفر تفاصيل إضافية عن هذه القطعة حالياً.";
        
        var cDiv = document.get
