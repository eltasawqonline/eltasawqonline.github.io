<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIILT x MOHANAD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;600;700&display=swap');
        
        :root { 
            --bg: #ffffff;
            --surface: #ffffff;
            --text: #000000;
            --muted: #777777;
            --border: #e8e8e8;
            --price: #111111;
            --whatsapp: #25D366;
            --danger: #ff3b30;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

        /* هيدر براند Hiilt النظيف جداً */
        header { 
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 30px; 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 100; 
            border-bottom: 1px solid var(--border);
        }
        
        .logo-title { font-size: 1.25rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }

        .cart-header-btn { background: none; border: 1px solid var(--text); padding: 6px 14px; font-family: inherit; font-weight: 600; font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
        .cart-count { background: var(--text); color: white; border-radius: 50%; min-width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* شبكة عرض المنتجات الفخمة - منتجين في الصف */
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px; max-width: 900px; margin: 0 auto; }
        
        .card { background: var(--surface); cursor: pointer; position: relative; margin-bottom: 15px; }
        .card img { width: 100%; height: 260px; object-fit: cover; background: #fafafa; display: block; transition: opacity 0.2s; }
        .card-info { padding: 12px 2px 2px 2px; text-align: right; }
        .card-info h3 { font-size: 0.85rem; font-weight: 400; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); letter-spacing: 0.3px; }
        .price { font-weight: 600; color: var(--price); font-size: 0.9rem; }

        /* المودالات كاملة الشاشة انسيابية مثل الماركات العالمية */
        .product-modal, .cart-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 2000; overflow-y: auto; display: none; }
        .close-modal { font-size: 1.6rem; cursor: pointer; position: absolute; left: 20px; top: 15px; z-index: 2100; background: #fff; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); }
        
        /* سلايدر صور ناعم وبسيط */
        .slider-wrapper { position: relative; width: 100%; background: #fff; border-bottom: 1px solid var(--border); }
        .slider-container { width: 100%; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .slider-container::-webkit-scrollbar { display: none; }
        .slider-container img { width: 100%; flex-shrink: 0; scroll-snap-align: start; object-fit: cover; height: 450px; }
        
        .dots-container { display: flex; justify-content: center; gap: 6px; padding: 12px 0; position: absolute; bottom: 10px; width: 100%; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(0,0,0,0.15); }
        .dot.active { background: var(--text); width: 14px; border-radius: 3px; }

        /* تفاصيل ومواصفات المنتج داخل الصفحة */
        .details-content { padding: 25px 20px; text-align: right; max-width: 600px; margin: 0 auto; }
        .section-title { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; color: var(--muted); margin-top: 25px; margin-bottom: 10px; letter-spacing: 1px; }
        
        .size-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .size-btn { border: 1px solid var(--border); padding: 8px 18px; cursor: pointer; background: #fff; font-size: 0.85rem; font-weight: 400; }
        .size-btn.active { background: var(--text); color: #fff; border-color: var(--text); }
        
        .color-dot { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border); display: inline-block; margin-left: 10px; cursor: pointer; position: relative; vertical-align: middle; }
        .color-dot.active::after { content: ''; position: absolute; top: -4px; left: -4px; right: -4px; bottom: -4px; border: 1px solid var(--text); border-radius: 50%; }

        /* استمارات الشحن الفخمة وبسيطة الخطوط */
        .shipping-form input, .shipping-form select, .shipping-form textarea { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid var(--border); box-sizing: border-box; background: #fff; font-family: inherit; font-size: 0.85rem; }
        .shipping-form input:focus, .shipping-form select:focus, .shipping-form textarea:focus { border-color: var(--text); outline: none; }
        
        .add-to-cart-btn { width: 100%; background: var(--text); color: #fff; border: none; padding: 15px; font-weight: 600; cursor: pointer; font-size: 0.9rem; font-family: inherit; margin-top: 25px; text-transform: uppercase; letter-spacing: 1px; }
        .whatsapp-btn { width: 100%; background: var(--whatsapp); color: #fff; border: none; padding: 15px; font-weight: 600; cursor: pointer; font-size: 0.9rem; font-family: inherit; letter-spacing: 0.5px; text-transform: uppercase; }

        .cart-item { display: flex; align-items: center; gap: 15px; padding: 15px 0; border-bottom: 1px solid var(--border); }
        .cart-item img { width: 60px; height: 80px; object-fit: cover; }
        .cart-item-info { flex: 1; text-align: right; font-size: 0.85rem; }
        .remove-item { color: var(--danger); cursor: pointer; font-size: 11px; margin-top: 4px; display: inline-block; }
        
        /* لوحة التاجر الأنيقة والمخفية */
        #adminPanel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; padding: 25px; border: 1px solid var(--border); z-index: 3000; width: 90%; max-width: 390px; text-align: right; }
        #adminPanel h3 { font-weight: 600; font-size: 1.1rem; margin-bottom: 15px; letter-spacing: 0.5px; }
        #adminPanel input, #adminPanel textarea { width: 100%; padding: 11px; margin-bottom: 10px; border: 1px solid var(--border); box-sizing: border-box; font-family: inherit; font-size: 0.85rem; }

        /* مراجعات العملاء النظيفة */
        .stars-display { color: #000; font-size: 0.85rem; margin: 4px 0; font-weight: 600; }
        .rating-section { border-top: 1px solid var(--border); padding-top: 20px; margin-top: 35px; }
        .review-box { padding: 10px 0; border-bottom: 1px solid var(--border); }
        .add-review-form { margin-top: 20px; display: flex; flex-direction: column; gap: 8px; }
        .star-rating-input { display: flex; gap: 4px; font-size: 1.2rem; cursor: pointer; color: #ccc; direction: ltr; justify-content: flex-end; }
        .star-rating-input span.active { color: #000; }
        .submit-review-btn { background: #fff; color: var(--text); border: 1px solid var(--text); padding: 10px; cursor: pointer; font-family: inherit; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; }
        
        .more-products-title { font-weight: 600; font-size: 1rem; margin: 45px 0 15px 0; border-top: 1px solid var(--border); padding-top: 25px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
    </style>
    <script>
        window.show = function() {
            var p = prompt("ادخل الرمز السري للوحة التحكم:");
            if(p === "2026") {
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('multiDeleteBtn').style.display = 'block';
                var boxes = document.querySelectorAll('.select-box');
                for(var i=0; i<boxes.length; i++) { boxes[i].style.display = 'block'; }
                return "مرحباً يا مهند، تم تفعيل لوحة التحكم بنجاح 🛠️";
            } else {
                alert("الرمز السري خطأ!");
                return "خطأ";
            }
        };
    </script>
</head>
<body>

<header id="mainHeader">
    <button class="cart-header-btn" onclick="openCart()">
        <span>BAG</span>
        <span class="cart-count" id="cartCount">0</span>
    </button>
    <button id="multiDeleteBtn" style="display:none; background:var(--danger); color:#fff; border:none; padding:6px 12px; cursor:pointer; font-family:inherit; font-size:0.8rem; font-weight:600;" onclick="deleteSelected()">حذف 🗑️</button>
    <h1 class="logo-title" onclick="location.reload()">HIILT x MOHANAD</h1>
</header>

<div class="container" id="productsGrid"></div>

<!-- مودال سلة المشتريات -->
<div id="cartModal" class="cart-modal">
    <span class="close-modal" onclick="closeCart()">×</span>
    <div style="padding: 24px; text-align: right; margin-top: 40px; max-width:550px; margin-left:auto; margin-right:auto;">
        <h2 style="font-weight:400; letter-spacing:1px; margin-bottom:20px; font-size:1.3rem;">حقيبة التسوق</h2>
        <div id="cartItems"></div>
        <div id="cartTotal" style="margin: 20px 0; font-weight: 600; font-size: 1rem; letter-spacing: 0.5px;"></div>
        
        <div class="shipping-form" id="cartShippingForm" style="display:none;">
            <h3 class="section-title">بيانات وتفاصيل التوصيل</h3>
            <input type="text" id="custName" placeholder="الاسم الكامل">
            <input type="tel" id="custPhone" placeholder="رقم الهاتف المحمول">
            <select id="custCity">
                <option value="">اختر المحافظة</option>
                <option>القاهرة</option><option>الجيزة</option><option>الإسكندرية</option><option>الدقهلية</option>
                <option>الغربية</option><option>المنوفية</option><option>القليوبية</option><option>الشرقية</option>
                <option>البحيرة</option><option>دمياط</option><option>بورسعيد</option><option>السويس</option>
                <option>الإسماعلية</option><option>كفر الشيخ</option><option>الفيوم</option><option>بني سويف</option>
                <option>المنيا</option><option>أسيوط</option><option>سوهاج</option><option>قنا</option>
                <option>الأقصر</option><option>أسوان</option><option>مطروح</option><option>الوادي الجديد</option>
                <option>البحر الأحمر</option><option>شمال سيناء</option><option>جنوب سيناء</option>
            </select>
            <textarea id="custAddress" rows="2" placeholder="العنوان التفصيلي"></textarea>
            <button class="whatsapp-btn" onclick="sendOrder()">تأكيد وإرسال عبر واتساب 💬</button>
        </div>
    </div>
</div>

<!-- لوحة التاجر الخاصة بك -->
<div id="adminPanel">
    <h3>إضافة قطعة جديدة للبراند</h3>
    <input type="text" id="pTitle" placeholder="اسم المنتج">
    <input type="number" id="pPrice" placeholder="السعر (EGP)">
    <textarea id="pImgs" rows="3" placeholder="روابط الصور (ضع رابط في كل سطر جديد)"></textarea>
    <textarea id="pDesc" rows="3" placeholder="وصف وتفاصيل القطعة"></textarea>
    <input type="text" id="pColors" placeholder="الألوان المتاحة (مثال: black, white, gray)">
    <input type="text" id="pSizes" placeholder="المقاسات المتوفرة (مثال: S, M, L, XL)">
    <button onclick="saveProduct()" style="width:100%; background:var(--text); color:#fff; padding:12px; border:none; cursor:pointer; font-weight:600; font-family:inherit; font-size:0.85rem; text-transform:uppercase;">حفظ ونشر القطعة</button>
    <button onclick="document.getElementById('adminPanel').style.display='none'" style="width:100%; background:none; border:none; color:var(--danger); margin-top:10px; cursor:pointer; font-family:inherit; font-size:0.85rem; font-weight:600;">إلغاء</button>
</div>

<!-- مودال تفاصيل القطعة والمعاينة الكاملة -->
<div id="productModal" class="product-modal">
    <span class="close-modal" onclick="closeModal()">×</span>
    <div class="slider-wrapper">
        <div id="imageSlider" class="slider-container" onscroll="updateDots()"></div>
        <div id="dotsContainer" class="dots-container"></div>
    </div>
    <div class="details-content">
        <h2 id="modalTitle" style="font-weight:400; font-size:1.2rem; margin-bottom: 2px;"></h2>
        <div id="modalAvgStars" class="stars-display"></div>
        <p id="modalPrice" style="font-size:1.1rem; font-weight:600; margin-top:5px; margin-bottom:20px;"></p>
        
        <div id="modalDesc" style="font-size:0.85rem; color:#333; line-height:1.7; margin-bottom:25px; white-space: pre-line;"></div>
        
        <div class="section-title">الألوان المتوفرة</div>
        <div id="modalColors" style="margin-bottom:20px;"></div>
        
        <div class="section-title">المقاس</div>
        <div id="modalSizes" class="size-grid" style="margin-bottom:25px;"></div>
        
        <div class="section-title">الكمية</div>
        <input type="number" id="custQty" value="1" min="1" style="width: 65px; padding: 8px; border: 1px solid var(--border); text-align:center; font-weight:600; font-family:inherit; margin-bottom:20px; outline:none;">
        
        <button class="add-to-cart-btn" onclick="addToCart()">إضافة إلى الحقيبة</button>

        <!-- المراجعات والتقييمات -->
        <div class="rating-section">
            <h3 style="font-weight:600; font-size:0.9rem; text-transform:uppercase; margin-bottom:15px; letter-spacing:0.5px;">آراء ومراجعات المشترين</h3>
            <div id="reviewsContainer" style="font-size:0.85rem; color:var(--muted);">لا توجد مراجعات بعد. كن أول من يضيف مراجعته!</div>
            
            <div class="add-review-form">
                <div class="star-rating-input" id="starInput">
                    <span onclick="setStarInput(1)">★</span><span onclick="setStarInput(2)">★</span><span onclick="setStarInput(3)">★</span><span onclick="setStarInput(4)">★</span><span onclick="setStarInput(5)">★</span>
                </div>
                <input type="text" id="revName" placeholder="الاسم">
                <textarea id="revComment" rows="2" placeholder="اكتب مراجعتك هنا..."></textarea>
                <button class="submit-review-btn" onclick="submitReview()">إرسال التقييم</button>
            </div>
        </div>

        <div class="more-products-title">قطع أخرى من الكوليكشن</div>
        <div class="container" id="relatedProductsGrid" style="padding:0; gap:12px;"></div>
    </div>
</div>

<script>
    var dbURL = "https://mohanadstore-2cb02-default-rtdb.firebaseio.com";
    var myPhone = "201044667187";
    var cart = [];
    var allProducts = {};
    var selectedProductId = null, selectedProduct = null, selCol = "", selSiz = "";
    var currentInputStars = 5;
    var isModalOpen = false;

    window.addEventListener('popstate', function(event) {
        if (isModalOpen) { closeModal(true); }
    });

    function addToCart() {
        var qty = parseInt(document.getElementById('custQty').value);
        if(!selCol || !selSiz || qty < 1) return alert("الرجاء اختيار اللون والمقاس المطلوب أولاً!");
        var firstImg = (selectedProduct.imgs && selectedProduct.imgs.length > 0) ? selectedProduct.imgs[0] : "";
        cart.push({ id: Date.now(), title: selectedProduct.title, price: selectedProduct.price, color: selCol, size: selSiz, qty: qty, img: firstImg });
        updateCartUI(); alert("تمت الإضافة بنجاح"); closeModal();
    }

    function updateCartUI() {
        document.getElementById('cartCount').innerText = cart.length;
        var itemsDiv = document.getElementById('cartItems');
        itemsDiv.innerHTML = ""; var total = 0;
        cart.forEach(function(item) {
            total += (item.price * item.qty);
            itemsDiv.innerHTML += '<div class="cart-item"><img src="'+item.img+'"><div class="cart-item-info"><strong>'+item.title+'</strong><br><span style="color:var(--muted); display:inline-block; margin-top:3px;">المقاس: '+item.size+' | اللون: '+item.color+' | العدد: '+item.qty+'</span><br><span style="font-weight:600; display:inline-block; margin-top:3px;">'+(item.price * item.qty)+' EGP</span><br><span class="remove-item" onclick="removeItem('+item.id+')">إزالة القطعة</span></div></div>';
        });
        document.getElementById('cartTotal').innerText = cart.length > 0 ? "الإجمالي المستحق: " + total + " EGP" : "الحقيبة فارغة حالياً.";
        document.getElementById('cartShippingForm').style.display = cart.length > 0 ? 'block' : 'none';
    }

    function removeItem(id) { cart = cart.filter(function(i) { return i.id !== id; }); updateCartUI(); }
    function openCart() { document.getElementById('cartModal').style.display = 'block'; }
    function closeCart() { document.getElementById('cartModal').style.display = 'none'; }

    function sendOrder() {
        var n = document.getElementById('custName').value.trim(), ph = document.getElementById('custPhone').value.trim(), city = document.getElementById('custCity').value, addr = document.getElementById('custAddress').value.trim();
        if(!n || !ph || !city || !addr) return alert("من فضلك املأ جميع خانات التوصيل!");
        var text = "", total = 0;
        cart.forEach(function(item, i) { text += (i+1)+'. ' + item.title + ' [مقاس: ' + item.size + ' | لون: ' + item.color + ' | عدد: ' + item.qty + ']\n'; total += (item.price * item.qty); });
        var msg = "طلب شراء جديد 🛍️\n\nالقطع المطلوبة:\n" + text + "\nإجمالي المبلغ: " + total + " EGP\n\nبيانات المستلم:\nالاسم: " + n + "\nرقم الهاتف: " + ph + "\nالمحافظة: " + city + "\nالعنوان بالتفصيل: " + addr;
        window.open("https://wa.me/" + myPhone + "?text=" + encodeURIComponent(msg));
        cart = []; updateCartUI(); closeCart();
    }

    function saveProduct() {
        var title = document.getElementById('pTitle').value.trim(), price = document.getElementById('pPrice').value.trim(), imgs = document.getElementById('pImgs').value.trim();
        if(!title || !price || !imgs) return alert("الاسم والسعر والصور حقول إجبارية!");
        var imgArray = imgs.split('\n').filter(function(u) { return u.trim() !== ""; });
        var data = { title: title, price: price, imgs: imgArray, desc: document.getElementById('pDesc').value.trim(), colors: document.getElementById('pColors').value.trim(), sizes: document.getElementById('pSizes').value.trim() };
        fetch(dbURL + "/products.json", { method: 'POST', body: JSON.stringify(data) }).then(function() { location.reload(); });
    }

    function deleteSelected() {
        var selected = document.querySelectorAll('.select-box:checked');
        if(confirm("هل تريد حذف هذه القطع نهائياً؟")) {
            var promises = [];
            selected.forEach(function(box) { promises.push(fetch(dbURL + "/products/" + box.value + ".json", { method: 'DELETE' })); });
            Promise.all(promises).then(function() { location.reload(); });
        }
    }

    function openProduct(id, p) {
        selectedProductId = id; selectedProduct = p; selCol = ""; selSiz = "";
        if (!isModalOpen) { window.history.pushState({ modalOpen: true }, ""); isModalOpen = true; }
        var modal = document.getElementById('productModal'), slider = document.getElementById('imageSlider'), dots = document.getElementById('dotsContainer');
        slider.innerHTML = ""; dots.innerHTML = "";
        var imgsList = p.imgs || [];
        imgsList.forEach(function(u, i) { slider.innerHTML += '<img src="'+u+'">'; dots.innerHTML += '<div class="dot '+(i===0?'active':'')+'"></div>'; });
        document.getElementById('modalTitle').innerText = p.title;
        document.getElementById('modalPrice').innerText = p.price + " EGP";
        document.getElementById('modalDesc').inne
