<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري الإلكتروني</title>
    <style>
        :root { --main: #000; --bg: #ffffff; --accent: #25D366; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; color: var(--main); overflow-x: hidden; }
        header { background: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #000; position: sticky; top: 0; z-index: 100; }
        
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; max-width: 600px; margin: 0 auto; }
        .card { background: #fff; cursor: pointer; border-radius: 12px; overflow: hidden; border: 3px solid transparent; position: relative; transition: transform 0.2s; }
        .card.selected { border-color: red; transform: scale(0.95); opacity: 0.8; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-info { padding: 8px; text-align: right; }
        .price { font-weight: 900; color: #d00; }

        .cart-header-btn { background: #f9f9f9; padding: 8px 16px; border-radius: 20px; cursor: pointer; display: flex; align-items: center; font-size: 1.2rem; position: relative; border: 1px solid #eee; }
        .cart-count { position: absolute; top: -6px; right: -6px; background: red; color: white; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .product-modal, .cart-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 2000; overflow-y: auto; display: none; opacity: 0; transform: translateY(30px); transition: 0.3s ease; }
        .show { display: block; opacity: 1; transform: translateY(0); }
        .close-modal { font-size: 2rem; cursor: pointer; position: absolute; left: 20px; top: 15px; z-index: 2100; background: #eee; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; }
        
        .slider-wrapper { position: relative; width: 100%; background: #f9f9f9; }
        .slider-container { width: 100%; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .slider-container img { width: 100%; flex-shrink: 0; scroll-snap-align: start; object-fit: contain; max-height: 450px; }
        
        .details-content { padding: 0 20px 50px 20px; text-align: right; }
        .size-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .size-btn { border: 1.5px solid #ddd; padding: 10px 18px; cursor: pointer; border-radius: 10px; font-weight: bold; }
        .size-btn.active { background: #000; color: #fff; border-color: #000; }
        .color-dot { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #ddd; display: inline-block; margin-left: 10px; cursor: pointer; }
        .color-dot.active { border-color: #000; transform: scale(1.1); }

        .shipping-form input, .shipping-form select, .shipping-form textarea { width: 100%; padding: 15px; margin-bottom: 12px; border: 1px solid #eee; border-radius: 12px; box-sizing: border-box; background: #fafafa; font-family: inherit; }
        .add-to-cart-btn { width: 100%; background: #000; color: #fff; border: none; padding: 20px; font-weight: bold; border-radius: 18px; cursor: pointer; font-size: 1.1rem; }
        .whatsapp-btn { width: 100%; background: var(--accent); color: #fff; border: none; padding: 20px; font-weight: bold; border-radius: 18px; cursor: pointer; font-size: 1.1rem; }

        .cart-item { display: flex; align-items: center; gap: 15px; padding: 15px; border-bottom: 1px solid #eee; }
        .cart-item img { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; }
        .remove-item { color: red; cursor: pointer; font-size: 14px; margin-top: 5px; }
        
        #adminPanel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; padding: 20px; border: 2px solid #000; z-index: 3000; width: 90%; max-width: 400px; border-radius: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.3); max-height: 80vh; overflow-y: auto; }
        #adminPanel input, #adminPanel textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-family: inherit; }
        .related-products { margin-top: 40px; border-top: 2px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 10px;">
        <h1 style="margin:0; font-size: 1.2rem;">متجري</h1>
        <button id="multiDeleteBtn" style="display:none; background:red; color:#fff; border:none; padding:8px 12px; border-radius:8px; font-weight:bold; cursor:pointer;" onclick="toggleDeleteMode()">حذف 🗑️</button>
    </div>
    <div class="cart-header-btn" onclick="openCart()">🛒 <span class="cart-count" id="cartCount">0</span></div>
</header>

<div class="container" id="productsGrid"></div>

<div id="cartModal" class="cart-modal">
    <span class="close-modal" onclick="closeCart()">×</span>
    <div style="padding: 20px; text-align: right; margin-top: 50px;">
        <h2>السلة 🛍️</h2>
        <div id="cartItems"></div>
        <div id="cartTotal" style="margin: 20px 0; font-weight: 900; font-size: 1.4rem;"></div>
        <div class="shipping-form" id="cartShippingForm" style="display:none;">
            <input type="text" id="custName" placeholder="الاسم">
            <input type="tel" id="custPhone" placeholder="رقم الموبايل">
            <textarea id="custAddress" placeholder="العنوان"></textarea>
            <button class="whatsapp-btn" onclick="sendOrder()">تأكيد الطلب</button>
        </div>
    </div>
</div>

<div id="adminPanel">
    <h3>إضافة منتج 🛠️</h3>
    <input type="text" id="pTitle" placeholder="اسم المنتج">
    <input type="number" id="pPrice" placeholder="السعر">
    <textarea id="pImgs" rows="2" placeholder="روابط الصور (سطر لكل رابط)"></textarea>
    <textarea id="pDesc" rows="2" placeholder="الوصف"></textarea>
    <input type="text" id="pColors" placeholder="الألوان (افصل بـ ,)">
    <input type="text" id="pSizes" placeholder="المقاسات (افصل بـ ,)">
    <button onclick="saveProduct()" style="width:100%; background:#000; color:#fff; padding:15px; border-radius:12px; border:none; cursor:pointer;">حفظ</button>
</div>

<div id="productModal" class="product-modal">
    <span class="close-modal" onclick="closeModal()">×</span>
    <div class="slider-wrapper">
        <div id="imageSlider" class="slider-container"></div>
    </div>
    <div class="details-content">
        <h2 id="modalTitle"></h2>
        <p id="modalPrice" style="font-size:1.6rem; font-weight:900; color:#d00;"></p>
        <div id="modalDesc" style="background:#f8f8f8; padding:15px; border-radius:12px;"></div>
        <p>اللون:</p><div id="modalColors"></div>
        <p>المقاس:</p><div id="modalSizes" class="size-grid"></div>
        <p>الكمية:</p><input type="number" id="custQty" value="1" min="1" style="padding:10px; border-radius:8px;">
        <button class="add-to-cart-btn" onclick="addToCart()" style="margin-top:20px">إضافة للسلة 🛒</button>
        <div class="related-products"><h3>منتجات أخرى:</h3><div id="relatedGrid" class="container" style="padding:0; margin-top:15px;"></div></div>
    </div>
</div>

<script>
    const dbURL = "https://mohanadstore-2cb02-default-rtdb.firebaseio.com/products";
    let cart = JSON.parse(localStorage.getItem('cart') || "[]");
    let allProducts = {}, selCol = "", selSiz = "", deleteMode = false, selectedIds = [];

    function getColorValue(c) {
        const map = {"كحلي":"#191970","نبيتي":"#800000","بني":"#8B4513","أسود":"#000","أبيض":"#fff","أحمر":"red","أزرق":"blue","أخضر":"green","رمادي":"gray","بيج":"#F5F5DC"};
        return map[c.trim()] || c.trim();
    }

    window.show = () => { if(prompt("Password:")==="123") { document.getElementById('adminPanel').style.display='block'; document.getElementById('multiDeleteBtn').style.display='block'; } };

    async function toggleDeleteMode() {
        if (!deleteMode) { deleteMode=true; document.getElementById('multiDeleteBtn').innerText="تأكيد الحذف (0)"; }
        else if (selectedIds.length > 0 && confirm("تأكيد الحذف؟")) {
            for(let id of selectedIds) await fetch(`${dbURL}/${id}.json`, {method:'DELETE'});
            location.reload();
        } else { location.reload(); }
    }

    async function loadStore() {
        const res = await fetch(`${dbURL}.json`);
        allProducts = await res.json() || {};
        const grid = document.getElementById('productsGrid'); grid.innerHTML = "";
        for (let id in allProducts) {
            const p = allProducts[id];
            const card = document.createElement('div'); card.className = 'card';
            card.onclick = () => {
                if(deleteMode) { 
                    if(selectedIds.includes(id)) { selectedIds=selectedIds.filter(i=>i!==id); card.classList.remove('selected'); }
                    else { selectedIds.push(id); card.classList.add('selected'); }
                    document.getElementById('multiDeleteBtn').innerText = `تأكيد (${selectedIds.length})`;
                } else openProduct(p);
            };
            card.innerHTML = `<img src="${p.imgs?.[0]||''}"><div class="card-info"><h3>${p.title}</h3><div class="price">${p.price} EGP</div></div>`;
            grid.appendChild(card);
        }
    }

    function openProduct(p) {
        let selectedProduct = p;
        const slider = document.getElementById('imageSlider'); slider.innerHTML = "";
        (p.imgs||[]).forEach(u => slider.innerHTML += `<img src="${u}">`);
        const cDiv = document.getElementById('modalColors'); cDiv.innerHTML = "";
        (p.colors||"").split(',').forEach(c => cDiv.innerHTML += `<div class="color-dot" style="background:${getColorValue(c)}" onclick="selCol='${c.trim()}'; document.querySelectorAll('.color-dot').forEach(d=>d.style.border='2px solid #ddd'); this.style.border='3px solid #000'"></div>`);
        const sDiv = document.getElementById('modalSizes'); sDiv.innerHTML = "";
        (p.sizes||"").split(',').forEach(s => sDiv.innerHTML += `<div class="size-btn" onclick="selSiz='${s.trim()}'; document.querySelectorAll('.size-btn').forEach(b=>b.style.background='#fff'); this.style.background='#000'; this.style.color='#fff'">${s.trim()}</div>`);
        document.getElementById('modalTitle').innerText = p.title; document.getElementById('modalPrice').innerText = p.price + " EGP"; document.getElementById('modalDesc').innerText = p.desc||"";
        document.getElementById('productModal').style.display='block'; setTimeout(()=>document.getElementById('productModal').classList.add('show'), 10);
        
        const related = document.getElementById('relatedGrid'); related.innerHTML = "";
        for(let id in allProducts) if(allProducts[id].title !== p.title) {
            let card = document.createElement('div'); card.className = 'card';
            card.onclick = () => { document.getElementById('productModal').scrollTop=0; openProduct(allProducts[id]); };
            card.innerHTML = `<img src="${allProducts[id].imgs?.[0]||''}"><div class="card-info"><h4>${allProducts[id].title}</h4><div class="price">${allProducts[id].price}</div></div>`;
            related.appendChild(card);
        }
    }

    function addToCart() {
        if(!selCol || !selSiz) return alert("اختر اللون والمقاس!");
        cart.push({ id:Date.now(), title:document.getElementById('modalTitle').innerText, price:document.getElementById('modalPrice').innerText, color:selCol, size:selSiz, qty:document.getElementById('custQty').value });
        localStorage.setItem('cart', JSON.stringify(cart)); updateCartUI(); closeModal();
    }

    function updateCartUI() {
        document.getElementById('cartCount').innerText = cart.length;
        const list = document.getElementById('cartItems'); list.innerHTML = "";
        cart.forEach(i => list.innerHTML += `<div class="cart-item"><strong>${i.title}</strong> (${i.color}/${i.size}) <span class="remove-item" onclick="remove(${i.id})">حذف</span></div>`);
    }

    function remove(id) { cart = cart.filter(i=>i.id !== id); localStorage.setItem('cart', JSON.stringify(cart)); updateCartUI(); }
    function closeModal() { document.getElementById('productModal').classList.remove('show'); setTimeout(()=>document.getElementById('productModal').style.display='none', 300); }
    function openCart() { document.getElementById('cartModal').style.display='block'; setTimeout(()=>document.getElementById('cartModal').classList.add('show'), 10); }
    function closeCart() { document.getElementById('cartModal').classList.remove('show'); setTimeout(()=>document.getElementById('cartModal').style.display='none', 300); }
    function sendOrder() { window.open(`https://wa.me/201044667187?text=طلب جديد`); }
    async function saveProduct() {
        const data = { title:document.getElementById('pTitle').value, price:document.getElementById('pPrice').value, imgs:document.getElementById('pImgs').value.split('\n'), desc:document.getElementById('pDesc').value, colors:document.getElementById('pColors').value, sizes:document.getElementById('pSizes').value };
        await fetch(`${dbURL}.json`, { method:'POST', body:JSON.stringify(data) }); location.reload();
    }
    
    loadStore(); updateCartUI();
</script>
</body>
</html>
