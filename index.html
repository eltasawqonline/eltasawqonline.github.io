<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التسوق اولاين</title>
    <style>
        :root { --main: #000; --bg: #ffffff; --accent: #25D366; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; color: var(--main); }
        header { background: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #000; position: sticky; top: 0; z-index: 100; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; max-width: 600px; margin: 0 auto; }
        .card { background: #fff; cursor: pointer; border-radius: 12px; overflow: hidden; border: 2px solid transparent; transition: all 0.3s; position: relative; }
        .card.selected { border-color: red; transform: scale(0.95); opacity: 0.7; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-info { padding: 8px; text-align: right; }
        .price { font-weight: 900; color: #d00; }
        
        /* ... (باقي التنسيقات زي ما هي) ... */
        .cart-header-btn { background: #f9f9f9; padding: 8px 16px; border-radius: 20px; cursor: pointer; display: flex; align-items: center; font-size: 1.2rem; position: relative; border: 1px solid #eee; }
        .cart-count { position: absolute; top: -6px; right: -6px; background: red; color: white; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .product-modal, .cart-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 2000; overflow-y: auto; display: none; opacity: 0; transition: 0.3s; }
        .show { display: block; opacity: 1; }
        .close-modal { font-size: 2rem; cursor: pointer; position: absolute; left: 20px; top: 15px; z-index: 2100; }
        .admin-btn { background: red; color: #fff; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; display: none; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; font-size: 1.2rem;">التسوق اولاين</h1>
    <button id="multiDeleteBtn" class="admin-btn" onclick="toggleDeleteMode()">حذف 🗑️</button>
    <div class="cart-header-btn" onclick="openCart()">🛒 <span class="cart-count" id="cartCount">0</span></div>
</header>

<div class="container" id="productsGrid"></div>

<!-- (نفس باقي عناصر الـ HTML السابقة زي اللوحة والمودال) -->
<div id="adminPanel" style="display:none; position: fixed; bottom: 0; width: 100%; background: #eee; padding: 20px; border-top: 2px solid #000; z-index: 3000;">
    <input type="text" id="pTitle" placeholder="اسم المنتج" style="width:100%; padding:10px; margin-bottom:5px;">
    <input type="number" id="pPrice" placeholder="السعر" style="width:100%; padding:10px; margin-bottom:5px;">
    <textarea id="pImgs" placeholder="روابط الصور" style="width:100%; padding:10px; margin-bottom:5px;"></textarea>
    <button onclick="saveProduct()" style="width:100%; background:green; color:white; padding:15px; border:none;">إضافة المنتج</button>
</div>

<script>
    const dbURL = "https://mohanadstore-2cb02-default-rtdb.firebaseio.com/products";
    let deleteMode = false;
    let selectedIds = [];
    let allProducts = {};

    window.show = function() {
        if(prompt("Password:") === "123") {
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('multiDeleteBtn').style.display = 'block';
        }
    };

    function toggleDeleteMode() {
        if (!deleteMode) {
            deleteMode = true;
            document.getElementById('multiDeleteBtn').innerText = "إلغاء الحذف";
            document.getElementById('multiDeleteBtn').style.background = "orange";
            alert("وضع الحذف مفعل! اضغط على المنتجات لتحديدها.");
        } else {
            if (selectedIds.length > 0) {
                if (confirm(`هل أنت متأكد من حذف ${selectedIds.length} منتج؟`)) {
                    selectedIds.forEach(async id => {
                        await fetch(`${dbURL}/${id}.json`, { method: 'DELETE' });
                    });
                    location.reload();
                }
            } else {
                deleteMode = false;
                selectedIds = [];
                document.getElementById('multiDeleteBtn').innerText = "حذف 🗑️";
                document.getElementById('multiDeleteBtn').style.background = "red";
                document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            }
        }
    }

    async function loadStore() {
        const res = await fetch(`${dbURL}.json`);
        allProducts = await res.json();
        const grid = document.getElementById('productsGrid'); grid.innerHTML = "";
        for (let id in allProducts) {
            const p = allProducts[id];
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => {
                if (deleteMode) {
                    if (selectedIds.includes(id)) {
                        selectedIds = selectedIds.filter(i => i !== id);
                        card.classList.remove('selected');
                    } else {
                        selectedIds.push(id);
                        card.classList.add('selected');
                        document.getElementById('multiDeleteBtn').innerText = `تأكيد حذف ${selectedIds.length} منتج`;
                    }
                } else {
                    /* دالة فتح المنتج */
                }
            };
            card.innerHTML = `<img src="${p.imgs ? p.imgs[0] : ''}"><div class="card-info"><h3>${p.title}</h3><div class="price">${p.price} EGP</div></div>`;
            grid.appendChild(card);
        }
    }

    async function saveProduct() {
        const data = { title: document.getElementById('pTitle').value, price: document.getElementById('pPrice').value, imgs: document.getElementById('pImgs').value.split('\n') };
        await fetch(`${dbURL}.json`, { method: 'POST', body: JSON.stringify(data) });
        location.reload();
    }

    loadStore();
</script>
</body>
</html>
